<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Driver Registration - CarHire</title>
    <link rel="stylesheet" href="/css/driver-login.css">
    <style>
        .register-box {
            max-width: 480px;
        }
        .register-box .input-group input {
            width: 100%;
        }
        .success-msg {
            background: rgba(0, 255, 0, 0.15);
            color: #6bcb77;
            padding: 0.8rem;
            border-radius: 8px;
            text-align: center;
            display: none;
            margin-bottom: 1rem;
            border: 1px solid #6bcb77;
        }
    </style>
</head>
<body>
    <div class="driver-login-container">
        <div class="login-box register-box">
            <div class="logo">
                🚗 CarHire
                <span>Become a Driver</span>
            </div>
            
            <h2>📝 Driver Registration</h2>
            <p class="subtitle">Join our team of professional drivers</p>
            
            <div id="successMsg" class="success-msg">✅ Registration successful! Please login.</div>
            <div id="errorMsg" class="error-msg"></div>
            
            <form id="driverRegisterForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="driver@carhire.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="input-group">
                    <label>Driver's License Number</label>
                    <input type="text" id="license_number" placeholder="DL123456" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="0712345678" required>
                </div>
                <div class="input-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Nairobi, Kenya">
                </div>
                <button type="submit">🚗 Register as Driver</button>
            </form>
            
            <div class="register-link">
                Already a driver? <a href="/driver-login">Login here</a>
            </div>
            
            <div class="back-link">
                <a href="/">← Back to Main Site</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('driverRegisterForm');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');

            form.onsubmit = async (e) => {
                e.preventDefault();
                
                const driverData = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    license_number: document.getElementById('license_number').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                };

                try {
                    const result = await registerDriver(driverData);
                    successMsg.style.display = 'block';
                    errorMsg.style.display = 'none';
                    form.reset();
                    setTimeout(() => {
                        window.location.href = '/driver-login';
                    }, 2000);
                } catch (error) {
                    errorMsg.textContent = '❌ ' + error.message;
                    errorMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                }
            };
        });
    </script>
</body>
</html>
